<style>
    /* Fila de Jugador NEXT LEVEL */
    .player-list-item {
        background-color: #ffffff;
        border: 1px solid #E2E8F0;
        border-radius: 12px;
        transition: all 0.3s ease;
        padding: 10px 15px;
    }
    .player-list-item:hover {
        border-color: var(--primary-blue);
        box-shadow: 0 4px 12px rgba(29, 78, 216, 0.08);
        transform: translateY(-1px);
    }

    /* Badge de Dorsal */
    .dorsal-badge {
        width: 35px;
        height: 35px;
        background-color: var(--primary-navy);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        font-weight: 800;
        font-size: 1rem;
        flex-shrink: 0;
    }

    /* Botones de acción rápidos */
    .btn-action-sm {
        width: 34px;
        height: 34px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        transition: all 0.2s;
        border: 1px solid transparent;
    }
    
    .btn-asis { background-color: #EFF6FF; color: var(--primary-blue); border-color: #DBEAFE; }
    .btn-asis:hover { background-color: var(--primary-blue); color: white; }
    
    .btn-gol-fast { background-color: #DCFCE7; color: #166534; border-color: #BBF7D0; }
    .btn-gol-fast:hover { background-color: #10B981; color: white; }

    /* Menú Dropdown de Sanciones */
    .dropdown-sanciones .btn-sancion {
        background-color: #F1F5F9;
        color: #475569;
        border: 1px solid #E2E8F0;
    }
    .dropdown-menu-premium {
        border: none;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        padding: 8px;
        min-width: 200px;
    }
    .dropdown-premium-item {
        border-radius: 8px;
        padding: 8px 12px;
        font-weight: 600;
        font-size: 0.85rem;
        margin-bottom: 2px;
        display: flex;
        align-items: center;
        width: 100%;
        border: none;
        background: transparent;
        transition: background 0.2s;
    }
    .dropdown-premium-item:hover { background-color: #F8FAFC; }
</style>

<div class="player-list-item d-flex justify-content-between align-items-center mb-2">
    <div class="d-flex align-items-center flex-grow-1 text-truncate">
        <div class="dorsal-badge me-3 shadow-sm">
            {{ jugador.dorsal|default:"--" }}
        </div>
        <div class="text-truncate" style="line-height: 1.2;">
            <span class="fw-black text-dark d-block text-truncate" style="font-size: 0.95rem;">{{ jugador.nombres|upper }}</span>
            <small class="text-muted fw-bold" style="font-size: 0.7rem; letter-spacing: 0.5px;">
                <i class="bi bi-person-vcard me-1"></i>{{ jugador.cedula }}
            </small>
        </div>
    </div>
    
    <div class="d-flex gap-2 align-items-center ps-2">
        <form method="post" class="m-0">
            {% csrf_token %}
            <input type="hidden" name="jugador_id" value="{{ jugador.id }}">
            <input type="hidden" name="tipo" value="ASIS">
            <button class="btn-action-sm btn-asis shadow-sm" title="Marcar Asistencia">
                <i class="bi bi-person-check-fill"></i>
            </button>
        </form>

        <form method="post" class="m-0">
            {% csrf_token %}
            <input type="hidden" name="jugador_id" value="{{ jugador.id }}">
            <input type="hidden" name="tipo" value="GOL">
            <button class="btn-action-sm btn-gol-fast shadow-sm" title="Anotar Gol">
                <i class="bi bi-trophy-fill" style="font-size: 0.85rem;"></i>
            </button>
        </form>

        <div class="dropdown dropdown-sanciones">
            <button class="btn-action-sm btn-sancion dropdown-toggle shadow-sm" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-shield-exclamation"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end dropdown-menu-premium animate__animated animate__fadeIn animate__faster">
                <li class="px-3 py-1 mb-1"><small class="text-muted fw-bold text-uppercase" style="font-size: 0.6rem;">Sanciones de Juego</small></li>
                <li>
                    <form method="post">{% csrf_token %}
                        <input type="hidden" name="jugador_id" value="{{ jugador.id }}">
                        <input type="hidden" name="tipo" value="TA">
                        <button class="dropdown-premium-item text-warning">
                            <span class="me-2">🟨</span> Tarjeta Amarilla
                        </button>
                    </form>
                </li>
                <li>
                    <form method="post">{% csrf_token %}
                        <input type="hidden" name="jugador_id" value="{{ jugador.id }}">
                        <input type="hidden" name="tipo" value="TR">
                        <button class="dropdown-premium-item text-danger">
                            <span class="me-2">🟥</span> Roja Directa
                        </button>
                    </form>
                </li>
                <li>
                    <form method="post">{% csrf_token %}
                        <input type="hidden" name="jugador_id" value="{{ jugador.id }}">
                        <input type="hidden" name="tipo" value="DA">
                        <button class="dropdown-premium-item text-danger" style="opacity: 0.8;">
                            <span class="me-2">🟨🟨</span> Doble Amarilla
                        </button>
                    </form>
                </li>
                <li><hr class="dropdown-divider mx-2"></li>
                <li class="px-3 py-1 mb-1"><small class="text-muted fw-bold text-uppercase" style="font-size: 0.6rem;">Infracciones Extra</small></li>
                <li>
                    <form method="post">{% csrf_token %}
                        <input type="hidden" name="jugador_id" value="{{ jugador.id }}">
                        <input type="hidden" name="tipo" value="AZUL">
                        <button class="dropdown-premium-item text-dark">
                            <i class="bi bi-person-slash me-2 text-primary"></i> Mal Uniformado
                        </button>
                    </form>
                </li>
                <li>
                    <form method="post">{% csrf_token %}
                        <input type="hidden" name="jugador_id" value="{{ jugador.id }}">
                        <input type="hidden" name="tipo" value="EBRI">
                        <button class="dropdown-premium-item text-dark">
                            <i class="bi bi-exclamation-octagon me-2 text-danger"></i> Estado Etílico
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</div>
